services:
  flightforms:
    build: .
    container_name: flightforms
    restart: unless-stopped
    ports:
      - "8030:8030"
    env_file: .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - ${HOST_DATA_DIR:-./data}:/app/data
      - ./src/flightforms/templates:/app/src/flightforms/templates
      - ./src/flightforms/mappings:/app/src/flightforms/mappings
    networks:
      - shared-services
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  shared-services:
    external: true
